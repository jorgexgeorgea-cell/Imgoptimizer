<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Web de Ganancias</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex items-center justify-center h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-2 text-center">EscribePro AI 🚀</h1>
        <p class="text-gray-400 text-sm mb-6 text-center">Tu generador de correos profesionales gratuito.</p>

        <label class="block mb-2 text-sm font-medium">¿Qué quieres escribir?</label>
        <textarea id="prompt" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white" rows="4" placeholder="Ej: Pedir permiso para faltar mañana..."></textarea>
        
        <button onclick="generar()" id="btn" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all transform active:scale-95">
            Generar con IA
        </button>

        <div id="resultado" class="mt-6 p-4 bg-gray-900 rounded-lg hidden border border-blue-500/30">
            <h2 class="text-blue-400 font-semibold mb-2 text-xs uppercase tracking-wider">Resultado:</h2>
            <p id="textoRespuesta" class="text-gray-200 text-sm leading-relaxed"></p>
        </div>
    </div>

    <script>
        async function generar() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('btn');
            const resDiv = document.getElementById('resultado');
            const resTexto = document.getElementById('textoRespuesta');

            // --- AQUÍ PEGAS TU API KEY ---
            const MI_LLAVE = "AIzaSyB9Q0JEftzISUx2l_PRsbNOwsky3ujY3-I"; 

            if(!prompt) return alert("Por favor, escribe algo.");

            btn.innerText = "Pensando...";
            btn.disabled = true;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MI_LLAVE}`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Escribe un correo profesional sobre: " + prompt }] }] })
                });

                const data = await response.json();
                resTexto.innerText = data.candidates[0].content.parts[0].text;
                resDiv.classList.remove('hidden');
            } catch (e) {
                alert("Error. Revisa que tu API Key sea correcta.");
            } finally {
                btn.innerText = "Generar con IA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
