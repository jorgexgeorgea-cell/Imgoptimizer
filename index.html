<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgOptimizador - Convierte y Comprime Gratis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-4xl h-24 bg-slate-800/50 border border-dashed border-slate-700 rounded-lg mb-8 flex items-center justify-center text-slate-500 text-xs uppercase tracking-widest">
        Publicidad - Espacio Disponible
    </div>

    <div class="w-full max-w-2xl bg-[#1e293b] p-8 rounded-3xl shadow-2xl border border-slate-700">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-400 mb-2">ImgOptimizador ⚡</h1>
            <p class="text-slate-400 text-sm font-medium">Convierte tus fotos a WebP, JPG o PNG al instante y sin perder calidad.</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-blue-500/40 bg-slate-900/50 rounded-2xl p-10 text-center hover:border-blue-400 transition cursor-pointer mb-6">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div class="flex flex-col items-center">
                <span class="text-4xl mb-4">🖼️</span>
                <p class="text-lg font-semibold text-blue-100">Arrastra tu imagen aquí</p>
                <p class="text-xs text-slate-500 mt-2 italic font-sans">Soporta PNG, JPG, JPEG y WebP</p>
            </div>
        </div>

        <div id="options" class="hidden space-y-6 animate-in fade-in duration-500">
