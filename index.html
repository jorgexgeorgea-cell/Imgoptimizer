<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail Pro - Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center py-10 px-4 text-white">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-xl border border-slate-700">
        <h1 class="text-3xl font-extrabold text-blue-400 mb-6 text-center italic">QuickMail Pro 🚀</h1>
        
        <div class="bg-slate-700 p-6 rounded-xl mb-6 border border-slate-600">
            <label class="block text-xs font-bold text-blue-300 mb-2 uppercase tracking-widest text-center">Nombre Personalizado</label>
            <input type="text" id="userInput" placeholder="Escribe cualquier nombre..." class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg outline-none text-white mb-4 focus:ring-2 focus:ring-blue-500 text-center">
            
            <label class="block text-xs font-bold text-blue-300 mb-2 uppercase tracking-widest text-center">Seleccionar Dominio</label>
            <select id="domainSelect" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg outline-none text-white mb-6 text-center">
                <option value="1secmail.com">@1secmail.com</option>
                <option value="1secmail.org">@1secmail.org</option>
                <option value="vmani.com">@vmani.com</option>
            </select>
            
            <button onclick="generarTodo()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 transition shadow-lg uppercase text-lg active:scale-95">
                ⚡ GENERAR CORREO AHORA
            </button>
        </div>

        <div class="bg-slate-950 p-6 rounded-2xl border-2 border-blue-600 mb-8">
            <input type="text" id="finalEmail" readonly class="w-full bg-transparent text-xl font-mono text-blue-400 text-center outline-none font-bold" value="¡HAZ CLIC ARRIBA!">
            <button onclick="copiarTexto()" id="btnCopiar" class="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-blue-300 py-2 rounded-lg text-xs font-bold border border-slate-600 uppercase hidden">Copiar Dirección</button>
        </div>

        <div class="border-t border-slate-700 pt-6">
            <h2 class="text-center text-slate-400 uppercase text-xs font-bold mb-4 tracking-tighter">Bandeja de Entrada en Vivo</h2>
            <div id="msgList" class="space-y-3 text-center text-slate-500 text-sm py-8 border-2 border-dashed border-slate-700 rounded-2xl">
                Elige un nombre y genera tu correo para ver mensajes.
            </div>
        </div>
    </div>

    <script>
        let correoActual = "";
        let intervalo = null;

        function generarTodo() {
            const nombre = document.getElementById('userInput').value.trim().toLowerCase();
            const dominio = document.getElementById('domainSelect').value;
            const randomNums = Math.floor(1000 + Math.random() * 9000); // Genera 4 números
            
            // Lógica: Nombre + números o solo letras random si está vacío
            let base = nombre ? nombre.replace(/[^a-z0-9]/g, '') + randomNums : Math.random().toString(36).substring(2, 10);
            
            correoActual = base + "@" + dominio;
            
            // Mostrar en pantalla
            document.getElementById('finalEmail').value = correoActual;
            document.getElementById('btnCopiar').classList.remove('hidden');
            document.getElementById('msgList').innerHTML = `<p class="animate-pulse text-blue-400">Revisando mensajes para:<br><b>${correoActual}</b></p>`;
            
            // Reiniciar buscador de mensajes
            if(intervalo) clearInterval(intervalo);
            buscarMensajes();
            intervalo = setInterval(buscarMensajes, 5000);
        }

        async function buscarMensajes() {
            if(!correoActual) return;
            const [user, dom] = correoActual.split('@');
            const proxy = "https://api.allorigins.win/get?url=";
            const api = encodeURIComponent(`https://www.1secmail.com/api/v1/?action=getMessages&login=${user}&domain=${dom}`);

            try {
                const res = await fetch(proxy + api);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                const lista = document.getElementById('msgList');

                if(data && data.length > 0) {
                    lista.innerHTML = "";
                    data.forEach(m => {
                        lista.innerHTML += `
                            <div class="p-4 bg-slate-700 border-l-4 border-blue-500 rounded text-left shadow-lg">
                                <p class="text-[10px] text-blue-300 font-bold uppercase">De: ${m.from}</p>
                                <p class="text-sm text-white font-bold">${m.subject}</p>
                            </div>`;
                    });
                }
            } catch (e) { console.log("Error de conexión..."); }
        }

        function copiarTexto() {
            const email = document.getElementById('finalEmail');
            navigator.clipboard.writeText(email.value);
            alert("¡Copiado!: " + email.value);
        }
    </script>
</body>
</html>
