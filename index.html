<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMail Express - Test Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center py-10 px-4 text-white">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-xl border border-slate-700">
        <h1 class="text-3xl font-extrabold text-blue-400 mb-2 text-center">ProMail Pro 🚀</h1>
        
        <div class="bg-slate-700 p-6 rounded-xl mb-6 border border-slate-600">
            <input type="text" id="userInput" placeholder="Tu nombre aquí..." class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg outline-none text-white mb-4">
            <select id="domainSelect" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg outline-none text-white mb-4">
                <option value="1secmail.com">@1secmail.com</option>
                <option value="1secmail.org">@1secmail.org</option>
                <option value="vmani.com">@vmani.com</option>
            </select>
            <button onclick="crearCorreo()" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition shadow-lg">
                Generar y Revisar
            </button>
        </div>

        <div class="bg-slate-900 p-5 rounded-2xl border-2 border-blue-500/50 mb-8">
            <input type="text" id="finalEmail" readonly class="w-full bg-transparent text-xl font-mono text-blue-400 text-center outline-none" value="Crea un correo arriba">
        </div>

        <div class="border-t border-slate-700 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-200 italic">Bandeja de Entrada</h2>
                <span id="statusIcon" class="text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-400 uppercase tracking-widest">Inactivo</span>
            </div>
            <div id="msgList" class="space-y-3 text-center text-slate-500 text-sm py-10 border-2 border-dashed border-slate-700 rounded-2xl">
                Esperando que envíes un mensaje...
            </div>
        </div>
    </div>

    <script>
        let mailActivo = "";
        let checker = null;

        function crearCorreo() {
            const rawName = document.getElementById('userInput').value.trim().toLowerCase();
            const dom = document.getElementById('domainSelect').value;
            const num = Math.floor(1000 + Math.random() * 9000);
            
            let finalName = rawName ? rawName.replace(/[^a-z0-9.]/g, '') + num : Math.random().toString(36).substring(2, 10);
            
            mailActivo = `${finalName}@${dom}`;
            document.getElementById('finalEmail').value = mailActivo;
            document.getElementById('statusIcon').innerText = "Conectado";
            document.getElementById('statusIcon').classList.replace('text-slate-400', 'text-green-400');
            
            document.getElementById('msgList').innerHTML = `<p class="animate-pulse">Buscando mensajes para:<br><b class="text-blue-300">${mailActivo}</b>...</p>`;
            
            if(checker) clearInterval(checker);
            checkApi();
            checker = setInterval(checkApi, 4000); // Revisa cada 4 segundos
        }

        async function checkApi() {
            if(!mailActivo) return;
            const [user, domain] = mailActivo.split('@');

            try {
                // Usamos una URL con timestamp para evitar que el navegador guarde la respuesta vieja
                const r = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${user}&domain=${domain}&t=${Date.now()}`);
                const data = await r.json();
                const box = document.getElementById('msgList');

                if(data && data.length > 0) {
                    box.innerHTML = "";
                    data.forEach(m => {
                        box.innerHTML += `
                            <div class="p-4 bg-slate-700 border-l-4 border-blue-400 rounded text-left shadow-lg animate-bounce">
                                <p class="text-[10px] text-blue-300 font-bold uppercase">De: ${m.from}</p>
                                <p class="text-sm text-white">${m.subject}</p>
                                <p class="text-[9px] text-slate-400 mt-1 italic text-right">Recibido ahora mismo</p>
                            </div>`;
                    });
                }
            } catch (e) {
                document.getElementById('statusIcon').innerText = "Error de Red";
                document.getElementById('statusIcon').classList.replace('text-green-400', 'text-red-400');
            }
        }

        window.onload = crearCorreo;
    </script>
</body>
</html>
